<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>SCHILLING'S AGENTS</title>
<link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet"/>
<style>
/* ── RESET ── */
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
:root{
  --bg:#1a1f3c;--dark:#0f0f1a;--darker:#0a0a15;--mid:#1a1a2e;
  --red:#e8202a;--blue:#1B3A8C;--teal:#64ffda;--yellow:#f8d030;
  --green:#64c850;--cream:#f8f4e8;
  --font:'Press Start 2P',monospace;
}
html,body{height:100%;background:var(--bg);font-family:var(--font);overflow:hidden;color:#fff;}
/* scanlines */
body::after{content:'';position:fixed;inset:0;pointer-events:none;z-index:9999;
  background:repeating-linear-gradient(0deg,transparent 0,transparent 3px,rgba(0,0,0,.06) 3px,rgba(0,0,0,.06) 4px);}

/* ── LAYOUT ── */
#app{display:flex;flex-direction:column;height:100vh;width:100vw;}

/* header */
#hdr{height:50px;flex-shrink:0;background:#16213e;border-bottom:2px solid var(--red);
  display:flex;align-items:center;gap:10px;padding:0 12px;}
#hdr-logo-wrap{display:flex;flex-direction:column;line-height:1;}
#hdr-logo{font-size:9px;color:var(--yellow);text-shadow:2px 2px 0 #000;white-space:nowrap;letter-spacing:1px;}
#hdr-sub{font-size:5px;color:#888;letter-spacing:1px;margin-top:3px;}
#hdr-input{flex:1;max-width:360px;margin:0 auto;font-family:var(--font);font-size:7px;
  background:#0d1828;color:#fff;border:2px solid #2a4a7a;box-shadow:3px 3px 0 #000;
  padding:7px 10px;outline:none;}
#hdr-input:focus{border-color:var(--yellow);}
#hdr-input::placeholder{color:#3a5a8a;}
#hdr-online{font-size:5px;color:var(--green);display:flex;align-items:center;gap:5px;white-space:nowrap;}
#hdr-dot{width:6px;height:6px;background:var(--green);border-radius:50%;animation:blink .9s step-end infinite;}

/* tabs */
#tabbar{height:32px;flex-shrink:0;background:#16213e;border-bottom:2px solid #1a1a3a;
  display:flex;align-items:flex-end;padding:0 12px;gap:0;}
.tabx{font-family:var(--font);font-size:6px;background:transparent;color:#555;
  border:none;border-bottom:2px solid transparent;padding:7px 9px;cursor:pointer;letter-spacing:.4px;}
.tabx:hover{color:#aaa;}
.tabx.on{color:var(--teal);border-bottom-color:var(--teal);}

/* 3-col main */
#main{flex:1;display:flex;overflow:hidden;min-height:0;}

/* left */
#col-l{width:220px;flex-shrink:0;background:var(--dark);border-right:2px solid var(--red);
  display:flex;flex-direction:column;overflow:hidden;}
/* center */
#col-c{flex:1;background:var(--mid);overflow:hidden;position:relative;display:flex;flex-direction:column;}
/* right */
#col-r{width:220px;flex-shrink:0;background:var(--darker);border-left:2px solid var(--blue);
  display:flex;flex-direction:column;overflow:hidden;}

/* footer */
#ftr{height:50px;flex-shrink:0;background:#16213e;border-top:2px solid var(--blue);
  display:flex;align-items:center;gap:8px;padding:0 12px;}
#ftr-session{flex:1;font-size:5px;color:#3a6aaa;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;padding:0 8px;}

/* ── LEFT MENU ── */
#menu-top{padding:12px 10px 8px;border-bottom:2px solid #1a1a3a;text-align:center;}
#menu-name{font-size:10px;color:var(--yellow);text-shadow:2px 2px 0 #000;line-height:1.7;letter-spacing:1px;}
#menu-course{font-size:4px;color:#666;margin-top:2px;letter-spacing:2px;}
#menu-ver{font-size:5px;color:var(--red);margin-top:5px;animation:blink .8s step-end infinite;letter-spacing:2px;}
#agent-list{flex:1;overflow-y:auto;padding:4px 0;}
.ag-item{display:flex;align-items:center;gap:6px;padding:6px 8px;cursor:pointer;
  border-left:3px solid transparent;transition:background .1s;}
.ag-item:hover{background:rgba(255,255,255,.04);}
.ag-item.sel{border-left-color:var(--red);background:rgba(232,32,42,.07);}
.ag-icon{flex-shrink:0;width:14px;height:14px;display:flex;align-items:center;justify-content:center;}
.ag-icon svg{width:14px;height:14px;}
.ag-name{font-size:6px;color:#bbb;flex:1;letter-spacing:.3px;}
.ag-item.sel .ag-name{color:#fff;}
.sbadge{font-size:4px;padding:2px 4px;border:1px solid;letter-spacing:.4px;flex-shrink:0;}
.sb-idle{color:#444;border-color:#444;}
.sb-running{color:var(--yellow);border-color:var(--yellow);animation:blink .5s step-end infinite;}
.sb-done{color:var(--green);border-color:var(--green);}
.sb-error{color:var(--red);border-color:var(--red);}
#menu-base{padding:6px;border-top:2px solid #1a1a3a;display:flex;gap:4px;}
.mbase-btn{flex:1;font-family:var(--font);font-size:5px;background:#16162a;color:#666;
  border:1px solid #2a2a4e;padding:5px 2px;cursor:pointer;letter-spacing:.3px;}
.mbase-btn:hover{background:#22224a;color:#fff;}

/* ── RIGHT LOG ── */
#log-hdr{padding:9px 10px 7px;font-size:7px;color:var(--teal);
  border-bottom:2px solid #1a1a2e;flex-shrink:0;letter-spacing:1px;
  display:flex;justify-content:space-between;align-items:center;}
#log-clear{font-size:5px;color:#333;background:none;border:none;cursor:pointer;letter-spacing:.5px;padding:0;}
#log-clear:hover{color:var(--red);}
#log-body{flex:1;overflow-y:auto;padding:2px 0;}
.log-row{padding:4px 8px;border-bottom:1px solid #0c0c18;font-size:5px;line-height:1.9;}
.lt{color:#333;}.lc-done{color:var(--green);}.lc-running{color:var(--yellow);}
.lc-error{color:var(--red);}.lc-info{color:#4a90d9;}

/* ── TAB PANES ── */
.pane{display:none;flex:1;overflow:hidden;flex-direction:column;}
.pane.on{display:flex;}

/* ── PANE: RODAR — OFFICE ── */
#office{flex:1;padding:14px;display:grid;grid-template-columns:repeat(4,1fr);
  grid-template-rows:repeat(2,1fr);gap:10px;overflow:hidden;
  background-image:linear-gradient(rgba(255,255,255,.025) 1px,transparent 1px),
                   linear-gradient(90deg,rgba(255,255,255,.025) 1px,transparent 1px);
  background-size:28px 28px;}

/* desk cell */
.dc{display:flex;flex-direction:column;align-items:center;justify-content:flex-end;
  cursor:pointer;padding:3px;border:2px solid transparent;position:relative;}
.dc:hover{border-color:rgba(248,208,48,.25);}
.dc.sel{border-color:var(--yellow);background:rgba(248,208,48,.04);}

/* speech bubble */
.dc-bubble{position:absolute;bottom:calc(100% - 20px);left:50%;transform:translateX(-50%);
  background:#fff;color:#000;border:2px solid #000;font-size:4px;padding:3px 5px;
  white-space:nowrap;display:none;z-index:10;}
.dc-bubble::after{content:'';position:absolute;top:100%;left:50%;transform:translateX(-50%);
  border:4px solid transparent;border-top-color:#000;}
.dc.running .dc-bubble{display:block;}

/* float indicator */
.dc-float{position:absolute;top:2px;left:50%;transform:translateX(-50%);
  font-size:9px;font-weight:bold;pointer-events:none;opacity:0;}
.dc-float.pop{animation:floatup 1.1s ease-out forwards;}
@keyframes floatup{0%{opacity:1;transform:translateX(-50%) translateY(0);}
  100%{opacity:0;transform:translateX(-50%) translateY(-22px);}}

/* pixel character */
.px{display:flex;flex-direction:column;align-items:center;margin-bottom:3px;}
.px-h{width:12px;height:10px;border:1.5px solid #000;border-radius:1px;}
.px-b{width:14px;height:8px;border:1.5px solid #000;border-top:none;}
.px-ls{display:flex;gap:2px;margin-top:0;}
.px-l{width:4px;height:6px;background:#3a2808;border:1px solid #000;}
.dc.running .px{animation:bounce .55s ease-in-out infinite alternate;}
@keyframes bounce{from{transform:translateY(0);}to{transform:translateY(-4px);}}

/* desk furniture */
.desk{width:100%;display:flex;flex-direction:column;align-items:center;}
.desk-top{width:86%;height:9px;background:#5c3317;border:2px solid #000;border-bottom:none;position:relative;}
.desk-mon{position:absolute;top:-20px;left:50%;transform:translateX(-50%);
  width:20px;height:15px;background:#222230;border:2px solid #000;
  display:flex;align-items:center;justify-content:center;}
.desk-scr{width:14px;height:9px;border:1px solid;}
.desk-body{width:83%;height:16px;background:#3d1f0a;border:2px solid #000;border-top:none;}
.dc-name{font-size:5px;color:#bbb;margin-top:5px;letter-spacing:.3px;text-align:center;}
.dc.done .dc-name::before{content:'> ';color:var(--green);}
.dc.error .dc-name::before{content:'! ';color:var(--red);}

/* ── PANE: REVISAR ── */
#rv-wrap{flex:1;display:flex;overflow:hidden;}
#rv-left{width:175px;flex-shrink:0;border-right:2px solid #000;display:flex;flex-direction:column;background:var(--dark);}
#rv-lhdr{padding:7px 9px;font-size:6px;color:var(--yellow);border-bottom:2px solid #000;}
#rv-slist{flex:1;overflow-y:auto;}
.rvsess{padding:6px 9px;border-bottom:1px solid #1a1a2a;cursor:pointer;position:relative;}
.rvsess:hover{background:rgba(255,255,255,.04);}
.rvsess.on{background:rgba(100,200,80,.07);border-left:3px solid var(--green);}
.rvsess-d{font-size:4px;color:#4a90d9;margin-bottom:2px;}
.rvsess-t{font-size:5px;color:#fff;word-break:break-word;line-height:1.5;}
.rvsess-del{position:absolute;top:6px;right:6px;background:transparent;border:none;color:#555;
  font-size:8px;cursor:pointer;line-height:1;padding:2px 4px;display:none;}
.rvsess:hover .rvsess-del{display:block;}
.rvsess-del:hover{color:var(--red);}
#rv-right{flex:1;display:flex;flex-direction:column;overflow:hidden;}
#rv-agtabs{display:flex;flex-shrink:0;border-bottom:2px solid #000;background:var(--dark);
  overflow-x:auto;scrollbar-width:none;}
.rv-atab{font-family:var(--font);font-size:5px;padding:7px 7px;background:var(--dark);color:#555;
  border:none;border-right:1px solid #000;cursor:pointer;white-space:nowrap;}
.rv-atab:hover{color:#fff;}
.rv-atab.on{color:var(--yellow);background:var(--mid);border-top:2px solid var(--yellow);}
.rv-dot{display:inline-block;width:4px;height:4px;margin-left:3px;vertical-align:middle;border-radius:50%;}
.rd-none{background:#333;}.rd-run{background:var(--yellow);}.rd-ok{background:var(--green);}.rd-err{background:var(--red);}
#rv-body{flex:1;display:flex;flex-direction:column;overflow:hidden;padding:8px;gap:5px;}
#rv-badge{font-size:5px;padding:3px 7px;border:2px solid;letter-spacing:1px;align-self:flex-start;}
.st-ag{color:#555;border-color:#555;}.st-ap{color:var(--green);border-color:var(--green);box-shadow:0 0 8px rgba(0,255,100,0.5);}
.st-rj{color:var(--red);border-color:var(--red);}
.st-gr{color:var(--yellow);border-color:var(--yellow);animation:blink .5s step-end infinite;}
#rv-ta{flex:1;font-family:var(--font);font-size:6px;line-height:2;background:var(--cream);
  color:#1a1a2a;border:2px solid #000;padding:8px;resize:none;outline:none;}
#rv-img{display:none;max-width:100%;border:2px solid #000;image-rendering:pixelated;}
#rv-foot{flex-shrink:0;display:flex;gap:5px;align-items:center;border-top:2px solid #1a1a2a;padding-top:6px;}
#rv-fb{flex:1;font-family:var(--font);font-size:6px;background:var(--dark);color:#fff;
  border:2px solid #333;padding:5px 7px;outline:none;}
#rv-fb::placeholder{color:#444;}
.rvb{font-family:var(--font);font-size:6px;padding:6px 9px;border:2px solid #000;
  cursor:pointer;box-shadow:3px 3px 0 #000;color:#fff;white-space:nowrap;}
.rvb:hover{transform:translate(2px,2px);box-shadow:1px 1px 0 #000;}
.rvb-ok{background:#2d7a2d;}.rvb-ng{background:#c0392b;}.rvb-rr{background:#c27c00;}

/* ── PANE: FILA ── */
#fila-inner{flex:1;overflow-y:auto;padding:10px;display:flex;flex-direction:column;gap:6px;}
.qi{background:var(--dark);border:2px solid #1a1a3a;padding:7px 9px;
  display:flex;align-items:center;gap:7px;}
.qi-plat{font-size:4px;padding:2px 5px;border:1px solid;flex-shrink:0;}
.qi-li{color:#4a90d9;border-color:#4a90d9;}.qi-ig{color:#c2185b;border-color:#c2185b;}
.qi-info{flex:1;min-width:0;}
.qi-theme{font-size:6px;color:#fff;margin-bottom:2px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
.qi-time{font-size:4px;color:#555;}
.qi-st{font-size:4px;padding:2px 4px;border:1px solid;flex-shrink:0;}
.qs-p{color:var(--yellow);border-color:var(--yellow);}
.qs-ok{color:var(--green);border-color:var(--green);}
.qs-f{color:var(--red);border-color:var(--red);}
.qi-x{font-family:var(--font);font-size:5px;background:transparent;color:#555;
  border:1px solid #333;padding:3px 5px;cursor:pointer;flex-shrink:0;}
.qi-x:hover{color:var(--red);border-color:var(--red);}
#fila-empty{font-size:7px;color:#333;text-align:center;padding:28px;margin:auto;}

/* ── PANE: BOT ── */
#bot-inner{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:8px;}
#bot-ph{font-size:7px;color:#2a2a4a;text-align:center;line-height:2.5;}
#bot-ph span{color:#444;}

/* ── PANE: ORQUESTRADOR ── */
#orch-wrap{flex:1;display:flex;overflow:hidden;}
#orch-left{width:160px;flex-shrink:0;border-right:2px solid #000;display:flex;flex-direction:column;background:var(--dark);}
#orch-lhdr{padding:7px 9px;font-size:6px;color:var(--yellow);border-bottom:2px solid #000;letter-spacing:.5px;}
#orch-plist{flex:1;overflow-y:auto;}
.op-item{padding:6px 9px;border-bottom:1px solid #1a1a2a;cursor:pointer;}
.op-item:hover{background:rgba(255,255,255,.04);}
.op-item.on{background:rgba(74,144,217,.07);border-left:3px solid var(--teal);}
.op-date{font-size:4px;color:#4a90d9;margin-bottom:2px;}
.op-preview{font-size:4.5px;color:#888;line-height:1.5;word-break:break-word;}
#orch-inner{flex:1;padding:12px;display:flex;flex-direction:column;gap:8px;overflow:hidden;}
#orch-btn{font-family:var(--font);font-size:7px;background:var(--blue);color:#fff;
  border:2px solid #000;box-shadow:4px 4px 0 #000;padding:11px 16px;cursor:pointer;
  align-self:flex-start;letter-spacing:.4px;}
#orch-btn:hover:not(:disabled){transform:translate(2px,2px);box-shadow:2px 2px 0 #000;}
#orch-btn:disabled{opacity:.5;cursor:not-allowed;}
#orch-out{flex:1;background:var(--dark);border:2px solid #1a1a3a;padding:9px;overflow-y:auto;
  font-size:5px;line-height:2;color:#777;}
.oc-lbl{color:var(--teal);font-size:5px;margin-bottom:5px;letter-spacing:.5px;}
.oc-txt{color:#bbb;font-size:5px;line-height:1.8;margin-bottom:10px;}
.plan-row{display:flex;gap:5px;align-items:baseline;padding:3px 0;
  border-bottom:1px solid #12121e;font-size:4px;}
.plan-d{color:#4a90d9;width:68px;flex-shrink:0;}
.plan-p{padding:1px 4px;border:1px solid;flex-shrink:0;font-size:4px;}
.plan-p.linkedin{color:#fff;background:#0077B5;border-color:#0077B5;}
.plan-p.instagram{color:#fff;background:#E1306C;border-color:#E1306C;}
.plan-row:hover{background:rgba(255,255,255,0.05);}
.plan-th{color:#ddd;flex:1;}
.plan-fmt{color:#444;font-size:4px;}

/* ── FOOTER BUTTONS ── */
.fbtn{font-family:var(--font);font-size:7px;padding:9px 12px;border:2px solid #000;
  box-shadow:4px 4px 0 #000;cursor:pointer;color:#fff;letter-spacing:.3px;white-space:nowrap;}
.fbtn:hover:not(:disabled){transform:translate(2px,2px);box-shadow:2px 2px 0 #000;}
.fbtn:active:not(:disabled){transform:translate(4px,4px);box-shadow:none;}
.fbtn:disabled{opacity:.4;cursor:not-allowed;}
#fb-all{background:var(--red);}
#fb-sel{background:var(--blue);}
#fb-rst{background:#383848;}

/* ── REVIEW: AGENT HEADER ── */
#rv-agent-hdr{flex-shrink:0;display:flex;align-items:center;gap:8px;padding:6px 0 8px;border-bottom:1px solid #333;margin-bottom:4px;}
#rv-agent-hdr-icon{flex-shrink:0;width:16px;height:16px;display:flex;align-items:center;}
#rv-agent-hdr-name{font-family:var(--font);font-size:8px;letter-spacing:1px;flex-shrink:0;}
#rv-agent-hdr-line{flex:1;height:1px;background:#333;}
/* ── REVIEW: RENDERED CONTENT ── */
#rv-content{flex:1;overflow-y:auto;padding:10px;background:var(--cream);color:#1a1a2a;border:2px solid #000;}
#rv-content h2{font-family:var(--font);font-size:8px;color:var(--yellow);margin:14px 0 6px;text-shadow:1px 1px 0 rgba(0,0,0,.3);}
#rv-content h3{font-family:var(--font);font-size:6px;color:#333;margin:10px 0 5px;}
#rv-content ul,#rv-content ol{padding-left:16px;margin:4px 0;}
#rv-content li{font-family:var(--font);font-size:5.5px;line-height:2.2;margin:2px 0;}
#rv-content p{font-family:var(--font);font-size:5.5px;line-height:2.2;margin:0;}
#rv-content strong{font-weight:bold;}

/* ── MISC ── */
@keyframes blink{0%,100%{opacity:1}50%{opacity:0}}
#lang-toggle{display:flex;align-items:center;gap:0;border:1px solid #2a4a7a;flex-shrink:0;}
.lang-btn{font-family:var(--font);font-size:6px;background:transparent;border:none;
  padding:4px 7px;cursor:pointer;color:#444;letter-spacing:.5px;}
.lang-btn:hover{color:#aaa;}
::-webkit-scrollbar{width:6px;}
::-webkit-scrollbar-track{background:#0a0e1a;}
::-webkit-scrollbar-thumb{background:#E8202A;}
::-webkit-scrollbar-thumb:hover{background:#ff3344;}
</style>
</head>
<body>
<div id="app">

  <!-- HEADER -->
  <div id="hdr">
    <div id="hdr-logo-wrap">
      <div id="hdr-logo">SCHILLING'S</div>
      <div id="hdr-sub">ENGLISH COURSE</div>
    </div>
    <input id="hdr-input" type="text" placeholder="Digite o Tema" maxlength="100"/>
    <div id="lang-toggle">
      <button class="lang-btn" id="lang-pt" onclick="setLang('pt')" style="color:var(--yellow)">PT</button>
      <span style="color:#2a4a7a;font-size:8px;">|</span>
      <button class="lang-btn" id="lang-en" onclick="setLang('en')">EN</button>
    </div>
    <div id="hdr-online"><div id="hdr-dot"></div>ONLINE</div>
  </div>

  <!-- TAB BAR -->
  <div id="tabbar">
    <button class="tabx on" data-tab="rodar"        onclick="switchTab('rodar')">RODAR</button>
    <button class="tabx"    data-tab="revisar"      onclick="switchTab('revisar')">REVISAR</button>
    <button class="tabx"    data-tab="fila"         onclick="switchTab('fila')">FILA</button>
    <button class="tabx"    data-tab="bot"          onclick="switchTab('bot')">BOT</button>
    <button class="tabx"    data-tab="orquestrador" onclick="switchTab('orquestrador')">ORQUESTRADOR</button>
  </div>

  <!-- MAIN -->
  <div id="main">

    <!-- LEFT MENU -->
    <div id="col-l">
      <div id="menu-top">
        <div id="menu-name">SCHILLING'S<br/>ENGLISH</div>
        <div id="menu-course">COURSE</div>
        <div id="menu-ver">AGENTS v1.0</div>
      </div>
      <div id="agent-list"></div>
      <div id="menu-base">
        <button class="mbase-btn" onclick="switchTab('fila')">FILA</button>
        <button class="mbase-btn" onclick="switchTab('bot')">BOT</button>
        <button class="mbase-btn" onclick="switchTab('orquestrador')">CFG</button>
      </div>
    </div>

    <!-- CENTER -->
    <div id="col-c">

      <!-- PANE: RODAR -->
      <div class="pane on" id="pane-rodar">
        <div id="office"></div>
      </div>

      <!-- PANE: REVISAR -->
      <div class="pane" id="pane-revisar">
        <div id="rv-wrap">
          <div id="rv-left">
            <div id="rv-lhdr">&gt; SESSOES</div>
            <div id="rv-slist"></div>
          </div>
          <div id="rv-right">
            <div id="rv-agtabs"></div>
            <div id="rv-body">
              <div id="rv-agent-hdr" style="display:none;">
                <div id="rv-agent-hdr-icon"></div>
                <div id="rv-agent-hdr-name"></div>
                <div id="rv-agent-hdr-line"></div>
              </div>
              <div id="rv-badge" class="st-ag">AGUARDANDO</div>
              <div id="rv-content"></div>
              <textarea id="rv-ta" style="display:none;" placeholder="sem conteudo..."></textarea>
              <img id="rv-img" src="" alt="design"/>
              <div id="rv-foot">
                <input id="rv-fb" type="text" placeholder="feedback para rejeicao..."/>
                <button class="rvb rvb-ok" onclick="rvApprove()">APROVAR</button>
                <button class="rvb rvb-ng" onclick="rvReject()">REJEITAR</button>
                <button class="rvb rvb-rr" onclick="rvRerun()">REGERAR</button>
              </div>
            </div>
          </div>
        </div>
      </div>

function lighten(hex, n) {
  const v = parseInt(hex.slice(1), 16);
  const r = Math.min(255, (v >> 16) + n);
  const g = Math.min(255, ((v >> 8) & 0xff) + n);
  const b = Math.min(255, (v & 0xff) + n);
  return '#' + ((1 << 24) | (r << 16) | (g << 8) | b).toString(16).slice(1);
}

function slug(t) {
  return t.toLowerCase().normalize('NFD')
    .replace(/[\u0300-\u036f]/g, '').replace(/[^a-z0-9]+/g, '-').replace(/^-|-$/g, '');
}
function today() { return new Date().toISOString().slice(0, 10); }

function runAll() {
  const topic = document.getElementById('hdr-input').value.trim();
  if (!topic) { log('_', t('log_need_theme'), 'info'); return; }
  startRun(topic, AGENTS.map(a => a.id));
}

function runSel() {
  const topic = document.getElementById('hdr-input').value.trim();
  if (!topic) { log('_', t('log_need_theme'), 'info'); return; }
  if (!S.selected) { log('_', t('log_need_agent'), 'info'); return; }
  startRun(topic, [S.selected]);
}

function resetAll() {
  AGENTS.forEach(a => setStatus(a.id, 'idle'));
  if (S.sse) { S.sse.close(); S.sse = null; }
  log('_', t('log_reset'), 'info');
}

function startRun(topic, agents) {
  if (S.sse) { S.sse.close(); S.sse = null; }
  const sl = slug(topic);
  const dt = today();
  S.session = { date: dt, topic: sl };
  document.getElementById('ftr-session').textContent = '> ' + topic.slice(0, 32) + ' — ' + dt;
  AGENTS.forEach(a => setStatus(a.id, 'idle'));
  log('_', t('log_starting') + ' "' + topic + '"', 'info');

  const url = '/api/run?topic=' + encodeURIComponent(topic) + '&agents=' + agents.join(',') + '&date=' + dt + '&lang=' + LANG;
  S.sse = new EventSource(url);

  S.sse.onmessage = function(e) {
    const d = JSON.parse(e.data);
    if (d.agent === '_start' || d.agent === '_end') {
      log('_', tMsg(d), 'info');
      if (d.agent === '_end') { S.sse.close(); S.sse = null; }
      return;
    }
    if (d.status === 'running') {
      setStatus(d.agent, 'running');
      log(d.agent, tMsg(d), 'running');
    } else if (d.status === 'done') {
      setStatus(d.agent, 'done');
      popFloat(d.agent, 'OK', '#64c850');
      log(d.agent, tMsg(d), 'done');
    } else if (d.status === 'error') {
      setStatus(d.agent, 'error');
      popFloat(d.agent, '!', '#e8202a');
      log(d.agent, tMsg(d), 'error');
    }
  };

  S.sse.onerror = function() {
    log('_', t('log_conn_lost'), 'error');
    if (S.sse) { S.sse.close(); S.sse = null; }
  };
}

// ══════════════════════════════════════════
//  MARKDOWN RENDERER
// ══════════════════════════════════════════
function escHtml(s) {
  return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}
function inlineMd(text) {
  return escHtml(text).replace(/\*\*(.+?)\*\*/g,'<strong>$1</strong>');
}
function renderMarkdown(text) {
  if (!text) return '';
  const lines = text.split('\n');
  let html = '', inUl = false, inOl = false;
  for (const line of lines) {
    if (/^### /.test(line)) {
      if (inUl){html+='</ul>';inUl=false;} if(inOl){html+='</ol>';inOl=false;}
      html += `<h3>${inlineMd(line.slice(4).trim())}</h3>`; continue;
    }
    if (/^## /.test(line)) {
      if (inUl){html+='</ul>';inUl=false;} if(inOl){html+='</ol>';inOl=false;}
      html += `<h2>${inlineMd(line.slice(3).trim())}</h2>`; continue;
    }
    if (/^# /.test(line)) {
      if (inUl){html+='</ul>';inUl=false;} if(inOl){html+='</ol>';inOl=false;}
      html += `<h2>${inlineMd(line.slice(2).trim())}</h2>`; continue;
    }
    if (/^[•\-] /.test(line)) {
      if (inOl){html+='</ol>';inOl=false;} if(!inUl){html+='<ul>';inUl=true;}
      html += `<li>${inlineMd(line.slice(2).trim())}</li>`; continue;
    }
    if (/^\d+\. /.test(line)) {
      if (inUl){html+='</ul>';inUl=false;} if(!inOl){html+='<ol>';inOl=true;}
      html += `<li>${inlineMd(line.replace(/^\d+\. /,'').trim())}</li>`; continue;
    }
    if (inUl){html+='</ul>';inUl=false;} if(inOl){html+='</ol>';inOl=false;}
    if (line.trim()===''){html+='<br>';continue;}
    html += `<p>${inlineMd(line)}</p>`;
  }
  if (inUl) html+='</ul>'; if(inOl) html+='</ol>';
  return html;
}

//  REVISAR
// ══════════════════════════════════════════
async function loadRvSessions() {
  const sessions = await fetch('/api/sessions').then(r => r.json()).catch(() => []);
  const list = document.getElementById('rv-slist');
  if (!sessions.length) {
    list.innerHTML = `<div style="padding:10px;font-size:5px;color:#333;text-align:center">${t('no_sessions')}</div>`;
    return;
  }
  list.innerHTML = sessions.map(s => `
    <div class="rvsess" onclick="pickRvSess('${s.date}','${s.topic}')">
      <div class="rvsess-d">${s.date}</div>
      <div class="rvsess-t">${s.topic.replace(/-/g,' ')}</div>
      <button class="rvsess-del" onclick="event.stopPropagation();deleteRvSess('${s.date}','${s.topic}')" title="Apagar sessao">✕</button>
    </div>
  `).join('');
}

async function deleteRvSess(date, topic) {
  if (!confirm('Apagar sessão "' + topic.replace(/-/g,' ') + '"?')) return;
  const r = await fetch('/api/session/' + date + '/' + topic, { method: 'DELETE' });
  if (r.ok) {
    if (S.rvSession?.date === date && S.rvSession?.topic === topic) S.rvSession = null;
    loadRvSessions();
  }
}

async function pickRvSess(date, topic) {
  S.rvSession = { date, topic };
  document.querySelectorAll('.rvsess').forEach(el => {
    const d = el.querySelector('.rvsess-d');
    const t = el.querySelector('.rvsess-t');
    el.classList.toggle('on', d && d.textContent === date && t && t.textContent === topic.replace(/-/g, ' '));
  });
  const agents = await fetch('/api/session/' + date + '/' + topic).then(r => r.json()).catch(() => []);
  buildRvTabs(agents || []);
  const first = (agents || []).find(a => a.exists) || (agents || [])[0];
  if (first) pickRvAgent(first.agent);
}

function dotCls(st) {
  if (!st || st === 'ausente') return 'rd-none';
  if (st === 'aprovado') return 'rd-ok';
  if (st === 'rejeitado' || st === 'error') return 'rd-err';
  if (st === 'gerando' || st === 'running') return 'rd-run';
  return 'rd-none';
}

function buildRvTabs(agentList) {
  document.getElementById('rv-agtabs').innerHTML = AGENTS.map(ag => {
    const info = (agentList || []).find(a => a.agent === ag.id) || {};
    const memSt = S.status[ag.id];
    const st = (memSt && memSt !== 'idle') ? memSt : (info.status || 'ausente');
    return `<button class="rv-atab${S.rvAgent === ag.id ? ' on' : ''}" id="rvt-${ag.id}"
              onclick="pickRvAgent('${ag.id}')">${ag.label}<span class="rv-dot ${dotCls(st)}" id="rvd-${ag.id}"></span></button>`;
  }).join('');
}

async function pickRvAgent(id) {
  S.rvAgent = id;
  document.querySelectorAll('.rv-atab').forEach(el => el.classList.toggle('on', el.id === 'rvt-' + id));
  // agent header
  const ag = AGENTS.find(a => a.id === id);
  const agHdr = document.getElementById('rv-agent-hdr');
  if (ag && agHdr) {
    const ICON_KEYS_RV = ['copy','posts','briefcase','search','funnel','envelope','megaphone'];
    document.getElementById('rv-agent-hdr-icon').innerHTML = svgIcon(ICON_KEYS_RV[AGENTS.indexOf(ag)], ag.col);
    const nameEl = document.getElementById('rv-agent-hdr-name');
    nameEl.textContent = ag.label;
    nameEl.style.color = ag.col;
    agHdr.style.borderColor = ag.col + '55';
    document.getElementById('rv-agent-hdr-line').style.background = ag.col + '55';
    agHdr.style.display = 'flex';
  }
  if (!S.rvSession) return;
  const { date, topic } = S.rvSession;
  const img = document.getElementById('rv-img');
  const ta  = document.getElementById('rv-ta');
  const rv  = document.getElementById('rv-content');
  if (id === 'design') {
    img.style.display = 'block';
    img.src = '/api/image/' + date + '/' + topic + '?t=' + Date.now();
    ta.style.display = 'none';
    rv.style.display = 'none';
  } else {
    img.style.display = 'none';
    ta.style.display  = 'none';
    rv.style.display  = '';
  }
  const d = await fetch('/api/content/' + date + '/' + topic + '/' + id)
    .then(r => r.json()).catch(() => ({ error: true }));
  const content = d.error ? '' : (d.content || '');
  ta.value = content;
  rv.innerHTML = renderMarkdown(content);
  const st = d.error ? 'ausente' : (d.status || 'aguardando');
  const badge = document.getElementById('rv-badge');
  const cls = { aguardando:'st-ag', aprovado:'st-ap', rejeitado:'st-rj', gerando:'st-gr', ausente:'st-ag', error:'st-err' };
  const badgeKey = { aguardando:'badge_waiting', aprovado:'badge_approved', rejeitado:'badge_rejected', gerando:'badge_generating', ausente:'badge_absent', error:'badge_error' };
  badge.textContent = t(badgeKey[st] || 'badge_waiting');
  badge.className = cls[st] || 'st-ag';
  document.getElementById('rv-fb').value = '';
}

async function rvApprove() {
  if (!S.rvSession) return;
  const { date, topic } = S.rvSession;
  await fetch('/api/content-save/' + date + '/' + topic + '/' + S.rvAgent, {
    method: 'POST', headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ content: document.getElementById('rv-ta').value }),
  }).catch(() => {});
  const r = await fetch('/api/approve/' + date + '/' + topic + '/' + S.rvAgent, { method: 'POST' })
    .then(r => r.json()).catch(() => ({ ok: false }));
  if (r.ok) {
    setStatus(S.rvAgent, 'aprovado');
    const b = document.getElementById('rv-badge');
    b.textContent = t('badge_approved'); b.className = 'st-ap';
    const d = document.getElementById('rvd-' + S.rvAgent);
    if (d) d.className = 'rv-dot rd-ok';
    log(S.rvAgent, t('log_approved'), 'done');
  }
}

async function rvReject() {
  if (!S.rvSession) return;
  const { date, topic } = S.rvSession;
  const fb = document.getElementById('rv-fb').value || '';
  const r = await fetch('/api/reject/' + date + '/' + topic + '/' + S.rvAgent, {
    method: 'POST', headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ feedback: fb }),
  }).then(r => r.json()).catch(() => ({ ok: false }));
  if (r.ok) {
    setStatus(S.rvAgent, 'error');
    const b = document.getElementById('rv-badge');
    b.textContent = t('badge_rejected'); b.className = 'st-rj';
    const d = document.getElementById('rvd-' + S.rvAgent);
    if (d) d.className = 'rv-dot rd-err';
    log(S.rvAgent, t('log_rejected'), 'error');
  }
}

async function rvRerun() {
  if (!S.rvSession) return;
  const { date, topic } = S.rvSession;
  const fb = document.getElementById('rv-fb').value || '';
  const b = document.getElementById('rv-badge');
  b.textContent = t('badge_generating'); b.className = 'st-gr';
  setStatus(S.rvAgent, 'running');
  log(S.rvAgent, t('log_regenerating'), 'running');
  const r = await fetch('/api/rerun/' + date + '/' + topic + '/' + S.rvAgent, {
    method: 'POST', headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ feedback: fb, lang: LANG }),
  }).then(r => r.json()).catch(() => ({ ok: false }));
  if (r.ok !== false) {
    const newContent = r.output || '';
    document.getElementById('rv-ta').value = newContent;
    document.getElementById('rv-content').innerHTML = renderMarkdown(newContent);
    if (S.rvAgent === 'design')
      document.getElementById('rv-img').src = '/api/image/' + date + '/' + topic + '?t=' + Date.now();
    setStatus(S.rvAgent, 'done');
    b.textContent = t('badge_waiting'); b.className = 'st-ag';
    log(S.rvAgent, t('log_regenerated'), 'done');
  } else {
    setStatus(S.rvAgent, 'error');
    b.textContent = t('badge_error'); b.className = 'st-rj';
  }
}

// ══════════════════════════════════════════
//  FILA
// ══════════════════════════════════════════
async function loadFila() {
  const data = await fetch('/api/queue').then(r => r.json()).catch(() => []);
  const inner = document.getElementById('fila-inner');
  if (!data.length) {
    inner.innerHTML = `<div id="fila-empty">${t('fila_empty')}</div>`;
    return;
  }
  inner.innerHTML = data.map(item => {
    const plat = item.platform || 'unknown';
    const platCls = plat === 'linkedin' ? 'qi-li' : 'qi-ig';
    const theme = (item.content || item.agent || '').slice(0, 55) + '...';
    const time  = (item.scheduledAt || '').slice(0, 16).replace('T', ' ');
    const stMap = { pending: ['qs-p', t('q_pending')], published: ['qs-ok', t('q_ok')], failed: ['qs-f', t('q_failed')] };
    const [stCls, stLbl] = stMap[item.status] || ['qs-p','PENDENTE'];
    const cancelBtn = item.status === 'pending'
      ? `<button class="qi-x" onclick="cancelQueue('${item.id}')">X</button>` : '';
    return `
      <div class="qi">
        <span class="qi-plat ${platCls}">${plat.toUpperCase()}</span>
        <div class="qi-info">
          <div class="qi-theme">${theme}</div>
          <div class="qi-time">${time}</div>
        </div>
        <span class="qi-st ${stCls}">${stLbl}</span>
        ${cancelBtn}
      </div>`;
  }).join('');
}

async function cancelQueue(id) {
  await fetch('/api/queue/' + id, { method: 'DELETE' }).catch(() => {});
  loadFila();
}

// ══════════════════════════════════════════
//  ORQUESTRADOR
// ══════════════════════════════════════════
async function loadOrchPlan() {
  const plan = await fetch('/api/plan').then(r => r.json()).catch(() => null);
  if (!plan || plan.error) return;
  renderPlan(plan);
}

async function loadPlansList() {
  const list = document.getElementById('orch-plist');
  const plans = await fetch('/api/plans').then(r => r.json()).catch(() => []);
  if (!plans.length) {
    list.innerHTML = `<div style="padding:8px;font-size:4.5px;color:#333;">no plans yet</div>`;
    return;
  }
  list.innerHTML = plans.map(p => `
    <div class="op-item" id="op-${p.id}" onclick="loadPlanById('${p.id}')">
      <div class="op-date">${p.id.replace('plan-','').slice(0,10)} ${p.id.slice(16,21).replace('-',':')}</div>
      <div class="op-preview">${p.preview}</div>
    </div>`).join('');
}

async function loadPlanById(id) {
  document.querySelectorAll('.op-item').forEach(el => el.classList.toggle('on', el.id === 'op-' + id));
  const plan = await fetch('/api/plans/' + id).then(r => r.json()).catch(() => null);
  if (plan) renderPlan(plan);
}

async function runOrchestrator() {
  const btn = document.getElementById('orch-btn');
  const out = document.getElementById('orch-out');
  btn.textContent = t('orch_btn_loading');
  btn.disabled = true;
  out.innerHTML = `<div style="color:var(--yellow);font-size:5px;animation:blink .5s step-end infinite">${t('orch_analyzing')}</div>`;
  log('_', t('log_orch_start'), 'info');

  const plan = await fetch('/api/orchestrator', {
    method: 'POST', headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ lang: LANG })
  }).then(r => r.json()).catch(e => ({ error: e.message }));

  btn.textContent = t('orch_btn');
  btn.disabled = false;

  if (plan.error) {
    out.innerHTML = `<div style="color:var(--red);font-size:5px;">${t('plan_error_prefix')}${plan.error}</div>`;
    log('_', t('log_orch_err') + plan.error, 'error');
    return;
  }
  log('_', t('log_orch_done'), 'done');
  await loadPlansList();
  // select the new plan in the list
  const newId = 'plan-' + (plan.generatedAt || '').replace(/[:.]/g, '-').replace('T','-').slice(0,19);
  document.querySelectorAll('.op-item').forEach(el => el.classList.toggle('on', el.id === 'op-' + newId));
  renderPlan(plan);
}

function renderPlan(plan) {
  const rows = (plan.plan || []).map(p => `
    <div class="plan-row">
      <span class="plan-d">${p.day || ''}</span>
      <span class="plan-p ${p.platform || ''}">${(p.platform || '').toUpperCase()}</span>
      <span class="plan-th">${p.theme || ''}</span>
      <span class="plan-fmt">[${p.format || ''}]</span>
    </div>`).join('');

  document.getElementById('orch-out').innerHTML = `
    <div class="oc-lbl">${t('plan_analysis')}</div>
    <div class="oc-txt">${plan.analysis || ''}</div>
    ${plan.immediate ? `
    <div class="oc-lbl">${t('plan_immediate')}</div>
    <div class="oc-txt">${plan.immediate.platform || ''} - ${plan.immediate.theme || ''}<br/>${plan.immediate.reason || ''}</div>` : ''}
    <div class="oc-lbl">${t('plan_7days')}</div>
    ${rows}
    <div style="font-size:4px;color:#2a2a4a;margin-top:8px;">${t('plan_generated')} ${plan.generatedAt || ''}</div>`;
}
